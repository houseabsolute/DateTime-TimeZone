name: Run tests

on:
  - pull_request
  - push

jobs:
  diagnose-windows-datetime:
    runs-on: windows-latest
    steps:
      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: latest

      - name: Perl version
        run: perl -V

      - name: Install DateTime::Locale with cpanm (verbose)
        run: cpanm --verbose --notest DateTime::Locale

      - name: Show cpanm build log on failure
        if: failure()
        shell: pwsh
        run: |
          $log = "$env:USERPROFILE\.cpanm\work\$(Get-ChildItem $env:USERPROFILE\.cpanm\work | Sort-Object LastWriteTime -Descending | Select-Object -First 1 -ExpandProperty Name)\build.log"
          if (Test-Path $log) { Get-Content $log }

      - name: Run DateTime Makefile.PL directly
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest https://cpan.metacpan.org/authors/id/D/DR/DROLSKY/DateTime-1.66.tar.gz -OutFile dt.tar.gz
          tar -xzf dt.tar.gz
          Push-Location DateTime-1.66
          Write-Host "=== Running perl Makefile.PL ==="
          perl Makefile.PL
          Write-Host "=== Exit code: $LastExitCode ==="
